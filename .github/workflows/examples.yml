name: examples

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    env:
      MODEL_PATH: models/tiny_model.gguf
      TINY_MODEL_URL: https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            archive_suffix: ubuntu-x64
            lib_glob: "*.so*"
            runtime_lib_env: LD_LIBRARY_PATH
            backend_candidates: "libggml-cpu-x64.so libggml-cpu-haswell.so libggml-cpu-*.so"
            system_deps: |
              sudo apt-get update
              sudo apt-get install -y cmake
            post_install: sudo ldconfig
          - os: macos-latest
            archive_suffix: macos-arm64
            lib_glob: "*.dylib*"
            runtime_lib_env: DYLD_LIBRARY_PATH
            backend_candidates: "libggml-cpu-arm64.dylib libggml-cpu-*.dylib"
            system_deps: brew install cmake
            post_install: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install system dependencies
        run: ${{ matrix.system_deps }}

      - name: Set llama.cpp version
        id: set_version
        run: |
          VERSION=$(cd "$GITHUB_WORKSPACE" && shards version)
          if [[ ! "$VERSION" =~ ^0\.([0-9]+)\.0$ ]]; then
            echo "Invalid shard version format: $VERSION (expected 0.<build>.0)"
            exit 1
          fi
          BUILD="${BASH_REMATCH[1]}"
          LLAMA_VERSION="b${BUILD}"
          echo "LLAMA_VERSION=${LLAMA_VERSION}" >> $GITHUB_ENV

      - name: Install llama.cpp
        run: |
          curl -L "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-${{ matrix.archive_suffix }}.tar.gz" -o llama.tar.gz
          tar -xzf llama.tar.gz
          LLAMA_DIR=$(ls -d llama-${LLAMA_VERSION}* | head -n1)
          sudo mkdir -p /usr/local/lib
          sudo cp "$LLAMA_DIR"/${{ matrix.lib_glob }} /usr/local/lib/ || true
          ${{ matrix.post_install }}

      - name: Set library and backend paths
        run: |
          echo 'LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV
          echo '${{ matrix.runtime_lib_env }}=/usr/local/lib' >> $GITHUB_ENV

          BACKEND_PATH=""
          for pattern in ${{ matrix.backend_candidates }}; do
            for candidate in /usr/local/lib/$pattern; do
              [ -f "$candidate" ] || continue
              BACKEND_PATH="$candidate"
              break 2
            done
          done

          if [ -n "$BACKEND_PATH" ]; then
            echo "GGML_BACKEND_PATH=$BACKEND_PATH" >> $GITHUB_ENV
            echo "Using GGML_BACKEND_PATH=$BACKEND_PATH"
          else
            echo "No GGML backend library found under /usr/local/lib; backend auto-detection will be used"
          fi

      - name: Install shard dependencies
        run: shards install

      - name: Cache model files
        id: cache-models
        uses: actions/cache@v5
        with:
          path: models
          key: ${{ runner.os }}-models-tinyllama-v2

      - name: Download test model (if not cached)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L "$TINY_MODEL_URL" -o "$MODEL_PATH"

      - name: Build examples
        run: |
          crystal build examples/simple.cr -o simple_example
          crystal build examples/chat.cr -o chat_example
          crystal build examples/tokenize.cr -o tokenize_example

      - name: Run simple example
        run: ./simple_example --model "$MODEL_PATH"

      - name: Run chat example
        run: ./chat_example --model "$MODEL_PATH"

      - name: Run tokenization example
        run: ./tokenize_example --model "$MODEL_PATH" --prompt "Hello, world!"
